{% extends "core/base.html" %}

{% block title %}Courses{% endblock %}

{% block content %}
<div class="p-6">
    <h1 class="text-2xl text-bold">Available Courses</h1>

    {% for course in courses %}
        <a href="{% url 'courses:course_detail' course.pk %}">
            <div class="p-6 m-6 bg-green-100 inline-block rounded-xl">
                <h3 class="text-xl text-bold">{{ course.title }}</h3>
                <p>{{ course.description }}</p>
                <p>Instructor: {{ course.instructor }}</p>
            </div>
    {% empty %}
        <p>No courses available.</p>
    {% endfor %}
</div>

{% endblock %}
