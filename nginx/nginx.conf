events {}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream django {
        server web:8000;
    }

    server {
        listen 443 ssl;
        server_name course-enrollment-system.uz www.course-enrollment-system.uz;

        ssl_certificate /etc/letsencrypt/live/course-enrollment-system.uz/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/course-enrollment-system.uz/privkey.pem;

        location /static/ {
            alias /static/;
        }

        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    server {
        listen 80;
        server_name course-enrollment-system.uz www.course-enrollment-system.uz;
        return 301 https://$host$request_uri;
    }
}