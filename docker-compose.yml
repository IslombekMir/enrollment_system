version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: enrollment_db
      POSTGRES_USER: enrollment_user
      POSTGRES_PASSWORD: enrollment_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: django_app
    command: >
      sh -c "
        echo 'Waiting for postgres...';
        while ! nc -z db 5432; do
          sleep 1;
        done;
        echo 'PostgreSQL started';
        python manage.py migrate &&
        python manage.py collectstatic --noinput &&
        gunicorn enrollment_system.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_NAME: enrollment_db
      DB_USER: enrollment_user
      DB_PASSWORD: enrollment_password
      DB_HOST: db
      DB_PORT: 5432

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - static_volume:/static
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume: